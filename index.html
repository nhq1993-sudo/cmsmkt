
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketing AdCMS Pro - VNPAY Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Override màu indigo mặc định bằng dải màu VNPAY Blue
              indigo: {
                50: '#eef6fc',
                100: '#d9ebf8',
                200: '#b9d9f2',
                300: '#87beea',
                400: '#4da0e0',
                500: '#2681d1',
                600: '#005baa', // Màu VNPAY chính thức
                700: '#004b8d',
                800: '#054075',
                900: '#0a3661',
                950: '#07264a',
              },
              // Cập nhật màu amber sang sắc vàng VNPAY để đồng bộ accent
              amber: {
                50: '#fffbeb',
                100: '#fef3c7',
                200: '#fde68a',
                300: '#fcd34d',
                400: '#fbbf24',
                500: '#fdb913', // Màu Vàng VNPAY
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
                950: '#451a03',
              }
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f8fafc;
        letter-spacing: -0.015em; /* Tinh chỉnh khoảng cách chữ hiện đại */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Hiệu ứng focus đặc trưng cho brand VNPAY */
      input:focus, select:focus, textarea:focus {
        border-color: #005baa !important;
        box-shadow: 0 0 0 4px rgba(0, 91, 170, 0.1) !important;
      }
      /* Tinh chỉnh lại các phần text font-black sang font-extrabold để trông thanh thoát hơn trên Plus Jakarta */
      .font-black {
        font-weight: 800 !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.48.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
